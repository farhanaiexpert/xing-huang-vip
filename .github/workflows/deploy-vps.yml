name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      vps_path:
        description: "Path on VPS (leave blank for default)"
        required: false
        default: "/var/www/xing-huang-vip"

jobs:
  deploy:
    name: SSH → Pull → Build → Restart
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 18m
          script: |
            set -e

            VPS_PATH="${{ github.event.inputs.vps_path }}"
            if [ -z "$VPS_PATH" ]; then
              VPS_PATH="/var/www/xing-huang-vip"
            fi

            echo "=== Deploying to $VPS_PATH ==="
            cd "$VPS_PATH"

            echo "--- git pull ---"
            git pull

            echo "--- pnpm install ---"
            pnpm install --frozen-lockfile

            echo "--- build api-server ---"
            pnpm --filter @workspace/api-server run build

            echo "--- build admin ---"
            pnpm --filter @workspace/admin run build

            echo "--- build sportsbook ---"
            pnpm --filter @workspace/sportsbook run build

            echo "--- pm2 restart (with env reload) ---"
            pm2 restart all --update-env

            echo "--- pm2 save ---"
            pm2 save

            echo "=== Build complete — waiting for server to come up ==="
            sleep 5

      - name: Health check
        run: |
          echo "Checking https://xinghuang.vip/api/healthz ..."
          curl -fsSL --retry 5 --retry-delay 5 --retry-connrefused \
               -o /dev/null -w "HTTP %{http_code}\n" \
               https://xinghuang.vip/api/healthz
          echo "Site is up."
