# Render.com Blueprint for Xing Huang
# ---------------------------------------------------------------------------
# This deploys the WHOLE project (database + backend + both frontends) on Render.
#
# HOW TO USE:
#   1. Push this repo to GitHub.
#   2. On Render: New + > Blueprint > connect this repo. Render reads this file.
#   3. Render creates the database, the API web service, and the static sites.
#   4. Fill in every env var marked "sync: false" in the Render dashboard
#      (these are SECRETS — never commit their values).
#
# IMPORTANT: service names below decide the public URLs, e.g.
#   xinghuang-api        -> https://xinghuang-api.onrender.com
#   xinghuang-sportsbook -> https://xinghuang-sportsbook.onrender.com
#   xinghuang-admin      -> https://xinghuang-admin.onrender.com
# If a name is already taken on Render, change it here AND update every URL
# below that references it (VITE_API_BASE_URL and ALLOWED_ORIGINS).
# ---------------------------------------------------------------------------

databases:
  - name: xinghuang-db
    databaseName: xinghuang
    plan: free # upgrade to 'starter' or higher for production (free DBs expire)

services:
  # ── Backend API (always-on, runs cron jobs) ──────────────────────────────
  - type: web
    name: xinghuang-api
    runtime: node
    plan: starter # the backend must stay always-on; 'free' sleeps and breaks crons
    buildCommand: pnpm install
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /api
      # Database connection — auto-injected from the managed Postgres above.
      - key: DATABASE_URL
        fromDatabase:
          name: xinghuang-db
          property: connectionString
      # Allow the two frontends to call this API (comma-separated origins).
      - key: ALLOWED_ORIGINS
        value: https://xinghuang-sportsbook.onrender.com,https://xinghuang-admin.onrender.com
      # ── Secrets: set these values in the Render dashboard (sync: false) ──
      - key: JWT_SECRET
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: BETSAPI_KEY
        sync: false
      - key: ALCHEMY_API_KEY
        sync: false
      - key: NOWPAYMENTS_API_KEY
        sync: false
      - key: NOWPAYMENTS_IPN_SECRET
        sync: false
      - key: CRYPTOMUS_API_KEY
        sync: false
      - key: CRYPTOMUS_MERCHANT_ID
        sync: false
      - key: PLISIO_API_KEY
        sync: false
      - key: PLISIO_IPN_SECRET
        sync: false
      - key: DEPOSIT_WALLET_ADDRESS
        sync: false
      - key: DEPOSIT_WALLET_ADDRESS_ERC
        sync: false
      - key: DEPOSIT_WALLET_ADDRESS_BSC
        sync: false
      - key: DEPOSIT_WALLET_ADDRESS_BTC
        sync: false
      - key: DEPOSIT_WALLET_ADDRESS_SOL
        sync: false
      - key: DEPOSIT_WALLET_ADDRESS_TON
        sync: false
      - key: DEPOSIT_WALLET_ADDRESS_XRP
        sync: false

  # ── Sportsbook frontend (static) ─────────────────────────────────────────
  - type: web
    name: xinghuang-sportsbook
    runtime: static
    buildCommand: pnpm install && pnpm --filter @workspace/sportsbook run build
    staticPublishPath: artifacts/sportsbook/dist/public
    envVars:
      # Baked into the bundle at BUILD time — must point at the API URL above.
      - key: VITE_API_BASE_URL
        value: https://xinghuang-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Admin frontend (static) ──────────────────────────────────────────────
  - type: web
    name: xinghuang-admin
    runtime: static
    buildCommand: pnpm install && pnpm --filter @workspace/admin run build
    staticPublishPath: artifacts/admin/dist/public
    envVars:
      - key: VITE_API_BASE_URL
        value: https://xinghuang-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
