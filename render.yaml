# Render.com Blueprint for Xing Huang — SINGLE SERVICE
# ---------------------------------------------------------------------------
# One web service serves EVERYTHING:
#   /        -> sportsbook frontend
#   /admin   -> admin frontend
#   /api/*   -> backend API (Express + cron jobs)
# Plus one managed PostgreSQL database.
#
# Because the frontends and API share one origin, there is NO CORS to configure
# and NO separate VITE_API_BASE_URL — the frontend just calls /api.
#
# HOW TO USE:
#   1. Push this repo to GitHub.
#   2. Render > New + > Blueprint > connect this repo.
#   3. Fill in every env var marked "sync: false" (these are SECRETS).
#
# If you already created the API service manually, you do NOT need the blueprint:
# just set its Build Command and Start Command to match the two commands below,
# add a PostgreSQL database, and set DATABASE_URL + the secrets.
# ---------------------------------------------------------------------------

services:
  - type: web
    name: xinghuang
    runtime: node
    plan: starter # must stay always-on so the odds/settlement cron jobs run
    healthCheckPath: /api/healthz
    # Install deps, then build BOTH frontends (admin uses the /admin base path).
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/sportsbook run build &&
      BASE_PATH=/admin/ pnpm --filter @workspace/admin run build
    # tsx runs the TypeScript server directly — no compile step needed.
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /api
      - key: DATABASE_URL
        sync: false
      # ── Secrets: set these values in the Render dashboard (sync: false) ──
      - key: JWT_SECRET
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: BETSAPI_KEY
        sync: false
      - key: ALCHEMY_API_KEY
        sync: false
      - key: NOWPAYMENTS_API_KEY
        sync: false
      - key: NOWPAYMENTS_IPN_SECRET
        sync: false
      - key: CRYPTOMUS_API_KEY
        sync: false
      - key: CRYPTOMUS_MERCHANT_ID
        sync: false
      - key: PLISIO_API_KEY
        sync: false
      - key: PLISIO_IPN_SECRET
        sync: false
      - key: DEPOSIT_WALLET_ADDRESS
        sync: false
      - key: DEPOSIT_WALLET_ADDRESS_ERC
        sync: false
      - key: DEPOSIT_WALLET_ADDRESS_BSC
        sync: false
      - key: DEPOSIT_WALLET_ADDRESS_BTC
        sync: false
      - key: DEPOSIT_WALLET_ADDRESS_SOL
        sync: false
      - key: DEPOSIT_WALLET_ADDRESS_TON
        sync: false
      - key: DEPOSIT_WALLET_ADDRESS_XRP
        sync: false
