kind = "web"
previewPath = "/admin/"
title = "CupBett Admin"
version = "1.0.0"
id = "artifacts/admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 23744

[services.development]
run = "pnpm --filter @workspace/admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin", "run", "build" ]
run = [ "node", "artifacts/admin/server.mjs" ]

[services.env]
PORT = "23744"
BASE_PATH = "/admin/"
