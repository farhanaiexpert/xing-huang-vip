<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Xing Huang Admin</title>
    <meta name="description" content="Xing Huang Admin — built on Replit. Update this description to reflect the app." />
    <meta name="robots" content="index, follow" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta property="og:title" content="Xing Huang Admin" />
    <meta property="og:description" content="Xing Huang Admin — built on Replit. Update this description to reflect the app." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Xing Huang Admin" />
    <meta name="twitter:description" content="Xing Huang Admin — built on Replit. Update this description to reflect the app." />
    <link rel="icon" type="image/webp" href="https://media.ourwebprojects.pro/wp-content/uploads/2026/06/Zing-Huang-favicon.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Google Translate: suppress ALL branding, toolbar, spinner, tooltips -->
    <style>
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      .skiptranslate > iframe,
      iframe.skiptranslate { display: none !important; visibility: hidden !important; }
      body { top: 0px !important; }
      #google_translate_element { display: none !important; }
      .goog-te-gadget, .goog-te-gadget-icon,
      .goog-logo-link, .goog-logo-link:link, .goog-logo-link:visited { display: none !important; }
      #goog-gt-tt, .goog-te-balloon-frame, .goog-tooltip,
      .goog-tooltip-content, .goog-tooltip-container { display: none !important; }
      .goog-te-spinner, .goog-te-spinner-pos, .goog-te-spinner-animation { display: none !important; }
      .goog-te-menu-frame, .goog-te-menu2 { display: none !important; }
      [class*="VIpgJd"] { display: none !important; }
      font[color] { color: inherit !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element" aria-hidden="true"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'en', autoDisplay: false },
          'google_translate_element'
        );
      }

      (function () {
        var HIDE_SELECTORS = [
          '.goog-te-banner-frame', '.skiptranslate > iframe', 'iframe.skiptranslate',
          '#goog-gt-tt', '.goog-te-balloon-frame', '.goog-tooltip',
          '.goog-tooltip-content', '.goog-tooltip-container',
          '.goog-te-spinner', '.goog-te-spinner-pos', '.goog-te-spinner-animation',
          '.goog-te-menu-frame', '.goog-te-menu2', '.goog-te-gadget', '.goog-logo-link',
        ].join(',');

        function suppressAll() {
          if (document.body && document.body.style.top !== '0px') {
            document.body.style.setProperty('top', '0px', 'important');
          }
          document.querySelectorAll(HIDE_SELECTORS).forEach(function (el) {
            el.style.setProperty('display', 'none', 'important');
            el.style.setProperty('visibility', 'hidden', 'important');
          });
          document.querySelectorAll('[class]').forEach(function (el) {
            if (el.className && typeof el.className === 'string' && el.className.indexOf('VIpgJd') !== -1) {
              el.style.setProperty('display', 'none', 'important');
            }
          });
        }

        var obs = new MutationObserver(suppressAll);
        document.addEventListener('DOMContentLoaded', function () {
          suppressAll();
          obs.observe(document.body, { attributes: true, attributeFilter: ['style'], childList: true, subtree: true });
        });
      })();
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
  </body>
</html>
