<button id="xh-connect-btn" onclick="window.location.href='/connect?redirect='+encodeURIComponent(window.location.origin)">
  <span class="dot"></span> 连接钱包 / Connect
</button>
<script>
(function(){
  var R = '/connect?redirect=' + encodeURIComponent(window.location.origin);
  document.addEventListener('click', function(e) {
    var el = e.target;
    while (el && el !== document && el !== document.documentElement) {
      var t = (el.textContent || '').toLowerCase();
      var tg = el.tagName ? el.tagName.toLowerCase() : '';
      var b = tg==='button' || tg==='a' || (el.getAttribute && el.getAttribute('role')==='button');
      if (b && (t.indexOf('sign in')+1 || t.indexOf('register')+1 || t.indexOf('connect wallet')+1)) {
        e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
        window.location.href = R; return;
      }
      el = el.parentElement;
    }
  }, true);
})();
</script>
