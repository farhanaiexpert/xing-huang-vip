    <!-- Google Translate: suppress ALL branding, toolbar, spinner, tooltips -->
    <style>
      /* Banner / toolbar iframe */
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      .skiptranslate > iframe,
      iframe.skiptranslate { display: none !important; visibility: hidden !important; }

      /* Keep body flush — Google pushes it down by 40px */
      body { top: 0px !important; }

      /* Hide the hidden mount point & its gadget */
      #google_translate_element { display: none !important; }
      .goog-te-gadget,
      .goog-te-gadget-icon,
      .goog-logo-link,
      .goog-logo-link:link,
      .goog-logo-link:visited { display: none !important; }

      /* Tooltip popup that appears on selected text */
      #goog-gt-tt,
      .goog-te-balloon-frame,
      .goog-tooltip,
      .goog-tooltip-content,
      .goog-tooltip-container { display: none !important; }

      /* Loading spinner shown top-right during translation */
      .goog-te-spinner,
      .goog-te-spinner-pos,
      .goog-te-spinner-animation { display: none !important; }

      /* Menu frame dropdown */
      .goog-te-menu-frame,
      .goog-te-menu2 { display: none !important; }

      /* Catch-all for any remaining VIpgJd-prefixed Google widget elements */
      [class*="VIpgJd"] { display: none !important; }

      /* Prevent colour bleed from Google's injected <font> tags */
      font[color] { color: inherit !important; }
    </style>

  <body>
    <div id="root"></div>

    <!-- Hidden Google Translate mount point -->
    <div id="google_translate_element" aria-hidden="true"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Google Translate init (must be global, non-module) -->
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'en', autoDisplay: false },
          'google_translate_element'
        );
      }

      // MutationObserver: aggressively suppress every Google Translate UI element.
      (function () {
        var HIDE_SELECTORS = [
          '.goog-te-banner-frame',
          '.skiptranslate > iframe',
          'iframe.skiptranslate',
          '#goog-gt-tt',
          '.goog-te-balloon-frame',
          '.goog-tooltip',
          '.goog-tooltip-content',
          '.goog-tooltip-container',
          '.goog-te-spinner',
          '.goog-te-spinner-pos',
          '.goog-te-spinner-animation',
          '.goog-te-menu-frame',
          '.goog-te-menu2',
          '.goog-te-gadget',
          '.goog-logo-link',
        ].join(',');

        function suppressAll() {
          // Force body back to top — Google offsets it when the bar would show
          if (document.body && document.body.style.top !== '0px') {
            document.body.style.setProperty('top', '0px', 'important');
          }
          // Hide every known Google Translate UI node
          document.querySelectorAll(HIDE_SELECTORS).forEach(function (el) {
            el.style.setProperty('display', 'none', 'important');
            el.style.setProperty('visibility', 'hidden', 'important');
          });
          // Hide any VIpgJd-prefixed elements (internal Google widget classes)
          document.querySelectorAll('[class]').forEach(function (el) {
            if (el.className && typeof el.className === 'string' && el.className.indexOf('VIpgJd') !== -1) {
              el.style.setProperty('display', 'none', 'important');
            }
          });
        }

        var obs = new MutationObserver(suppressAll);
        document.addEventListener('DOMContentLoaded', function () {
          suppressAll();
          obs.observe(document.body, { attributes: true, attributeFilter: ['style'], childList: true, subtree: true });
        });
      })();
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
