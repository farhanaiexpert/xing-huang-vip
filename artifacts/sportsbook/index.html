<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>CupBett — Sports Betting</title>
    <meta name="description" content="CupBett — live odds, instant settlement, and provably fair sports markets." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="CupBett" />
    <meta property="og:description" content="CupBett — live odds, instant settlement, and provably fair sports markets." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CupBett" />
    <meta name="twitter:description" content="CupBett — live odds, instant settlement, and provably fair sports markets." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Google Translate: suppress toolbar banner & force body position -->
    <style>
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      .skiptranslate > iframe { display: none !important; visibility: hidden !important; }
      body { top: 0px !important; }
      #google_translate_element { display: none !important; }
      .goog-te-gadget { display: none !important; }
      .goog-logo-link { display: none !important; }
      #goog-gt-tt, .goog-te-balloon-frame { display: none !important; }
      font[color] { color: inherit !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Hidden Google Translate mount point -->
    <div id="google_translate_element" aria-hidden="true"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Google Translate init (must be global, non-module) -->
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'en', autoDisplay: false },
          'google_translate_element'
        );
      }

      // MutationObserver: continuously fight Google's dynamic body.style.top offset
      // and ensure the banner iframe stays hidden after translation kicks in.
      (function () {
        function suppressGoogleBar() {
          // Force body back to top:0 whenever Google sets it
          if (document.body && document.body.style.top !== '0px') {
            document.body.style.setProperty('top', '0px', 'important');
          }
          // Hide banner frame iframes
          document.querySelectorAll('.goog-te-banner-frame, .skiptranslate > iframe').forEach(function (el) {
            el.style.setProperty('display', 'none', 'important');
          });
        }

        var obs = new MutationObserver(suppressGoogleBar);
        document.addEventListener('DOMContentLoaded', function () {
          suppressGoogleBar();
          obs.observe(document.body, { attributes: true, attributeFilter: ['style'], childList: true, subtree: true });
        });
      })();
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>

    <!-- Protect specific words from Google Translate -->
    <script>
      (function () {
        var PROTECTED = ['CupBett', 'USDTs', 'USDT'];
        var REGEX = /(CupBett|USDTs|USDT)/g;
        var seen = new WeakSet();

        function wrapNode(node) {
          if (seen.has(node)) return;
          var text = node.nodeValue || '';
          if (!PROTECTED.some(function (w) { return text.indexOf(w) !== -1; })) return;
          seen.add(node);

          var parts = text.split(REGEX);
          if (parts.length <= 1) return;

          var frag = document.createDocumentFragment();
          parts.forEach(function (part) {
            if (PROTECTED.indexOf(part) !== -1) {
              var span = document.createElement('span');
              span.className = 'notranslate';
              span.setAttribute('translate', 'no');
              span.textContent = part;
              frag.appendChild(span);
            } else if (part) {
              frag.appendChild(document.createTextNode(part));
            }
          });
          if (node.parentNode) node.parentNode.replaceChild(frag, node);
        }

        function walk(root) {
          var walker = document.createTreeWalker(
            root,
            NodeFilter.SHOW_TEXT,
            {
              acceptNode: function (n) {
                var p = n.parentNode;
                if (!p) return NodeFilter.FILTER_REJECT;
                var tag = p.nodeName;
                if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'NOSCRIPT') return NodeFilter.FILTER_REJECT;
                if (p.classList && p.classList.contains('notranslate')) return NodeFilter.FILTER_REJECT;
                if (p.getAttribute && p.getAttribute('translate') === 'no') return NodeFilter.FILTER_REJECT;
                return NodeFilter.FILTER_ACCEPT;
              }
            }
          );
          var nodes = [];
          var n;
          while ((n = walker.nextNode())) nodes.push(n);
          nodes.forEach(wrapNode);
        }

        var observer = new MutationObserver(function (mutations) {
          mutations.forEach(function (m) {
            m.addedNodes.forEach(function (n) {
              if (n.nodeType === 3) wrapNode(n);
              else if (n.nodeType === 1) walk(n);
            });
          });
        });

        document.addEventListener('DOMContentLoaded', function () {
          walk(document.body);
          observer.observe(document.body, { childList: true, subtree: true });
        });
      })();
    </script>
  </body>
</html>
