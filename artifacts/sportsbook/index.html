<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>CupBett — Sports Betting</title>
    <meta name="description" content="CupBett — live odds, instant settlement, and provably fair sports markets." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="CupBett" />
    <meta property="og:description" content="CupBett — live odds, instant settlement, and provably fair sports markets." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CupBett" />
    <meta name="twitter:description" content="CupBett — live odds, instant settlement, and provably fair sports markets." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Google Translate: suppress toolbar banner & force body position -->
    <style>
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      .skiptranslate > iframe { display: none !important; visibility: hidden !important; }
      body { top: 0px !important; }
      #google_translate_element { display: none !important; }
      .goog-te-gadget { display: none !important; }
      .goog-logo-link { display: none !important; }
      #goog-gt-tt, .goog-te-balloon-frame { display: none !important; }
      font[color] { color: inherit !important; }
    </style>

    <!--
      Word-protection script — runs as early as possible so MutationObserver
      is active before React renders and before Google Translate fires.
      Strategy:
        1. Walk text nodes and wrap protected words in <span class="notranslate">
        2. Re-scan via MutationObserver whenever new nodes are added (React nav, etc.)
        3. Re-scan on a 500 ms interval for the first 30 s to catch GT's post-
           translation DOM replacements (GT can destroy our spans when it writes
           translated text back to the DOM)
        4. Also re-scan whenever the <html lang> attribute changes (GT sets it
           to the target language when translation completes)
    -->
    <script>
      (function () {
        var PROTECTED = ['CupBett', 'USDTs', 'USDT'];
        // Longer tokens first so "USDTs" is matched before "USDT"
        var REGEX = /(CupBett|USDTs|USDT)/g;

        function protect(root) {
          if (!root || root.nodeType !== 1) return;

          var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
          var nodes = [];
          var n;
          while ((n = walker.nextNode())) {
            var p = n.parentNode;
            if (!p) continue;
            var tag = p.nodeName;
            if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'NOSCRIPT' || tag === 'TEXTAREA') continue;
            // Already inside a notranslate element — skip
            if (p.classList && p.classList.contains('notranslate')) continue;
            if (p.getAttribute && p.getAttribute('translate') === 'no') continue;
            if (PROTECTED.some(function (w) { return (n.nodeValue || '').indexOf(w) !== -1; })) {
              nodes.push(n);
            }
          }

          nodes.forEach(function (node) {
            if (!node.parentNode) return;
            var text = node.nodeValue || '';
            var parts = text.split(REGEX);
            if (parts.length <= 1) return;

            var frag = document.createDocumentFragment();
            parts.forEach(function (part) {
              if (PROTECTED.indexOf(part) !== -1) {
                var span = document.createElement('span');
                span.className = 'notranslate';
                span.setAttribute('translate', 'no');
                span.textContent = part;
                frag.appendChild(span);
              } else if (part) {
                frag.appendChild(document.createTextNode(part));
              }
            });
            node.parentNode.replaceChild(frag, node);
          });
        }

        // MutationObserver — catches React renders and GT DOM rewrites
        var observer = new MutationObserver(function (mutations) {
          var roots = new Set();
          mutations.forEach(function (m) {
            m.addedNodes.forEach(function (n) {
              if (n.nodeType === 1) roots.add(n);
              else if (n.nodeType === 3 && n.parentNode && n.parentNode.nodeType === 1) roots.add(n.parentNode);
            });
          });
          roots.forEach(protect);
        });

        function startObserver() {
          if (document.body) {
            protect(document.body);
            observer.observe(document.body, { childList: true, subtree: true });
          }
        }

        // Start as early as the body is available
        if (document.body) {
          startObserver();
        } else {
          document.addEventListener('DOMContentLoaded', startObserver);
        }

        // Periodic re-scan: fires every 500 ms for the first 30 s to catch
        // any words that GT translated between our observer callbacks.
        var elapsed = 0;
        var interval = setInterval(function () {
          elapsed += 500;
          if (document.body) protect(document.body);
          if (elapsed >= 30000) clearInterval(interval);
        }, 500);

        // Also re-scan whenever GT signals translation is done by changing <html lang>
        var htmlObserver = new MutationObserver(function () {
          if (document.body) protect(document.body);
        });
        htmlObserver.observe(document.documentElement, {
          attributes: true,
          attributeFilter: ['lang', 'class']
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Hidden Google Translate mount point -->
    <div id="google_translate_element" aria-hidden="true"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Google Translate init (must be global, non-module) -->
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'en', autoDisplay: false },
          'google_translate_element'
        );
      }

      // MutationObserver: continuously fight Google's dynamic body.style.top offset
      // and ensure the banner iframe stays hidden after translation kicks in.
      (function () {
        function suppressGoogleBar() {
          if (document.body && document.body.style.top !== '0px') {
            document.body.style.setProperty('top', '0px', 'important');
          }
          document.querySelectorAll('.goog-te-banner-frame, .skiptranslate > iframe').forEach(function (el) {
            el.style.setProperty('display', 'none', 'important');
          });
        }

        var obs = new MutationObserver(suppressGoogleBar);
        document.addEventListener('DOMContentLoaded', function () {
          suppressGoogleBar();
          obs.observe(document.body, { attributes: true, attributeFilter: ['style'], childList: true, subtree: true });
        });
      })();
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
  </body>
</html>
