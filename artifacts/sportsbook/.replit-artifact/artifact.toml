kind = "web"
previewPath = "/"
title = "Sportsbook"
version = "1.0.0"
id = "artifacts/sportsbook"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19977

[services.development]
run = "pnpm --filter @workspace/sportsbook run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sportsbook", "run", "build" ]
publicDir = "artifacts/sportsbook/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19977"
BASE_PATH = "/"
